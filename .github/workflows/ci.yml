name: CI

on:
    push:
        branches: [main]
    pull_request:

jobs:
    verify:
        runs-on: ubuntu-latest
        services:
            redis:
                image: redis:7
                ports:
                    - 6379:6379
        env:
            REDIS_URL: redis://localhost:6379
        steps:
            - uses: actions/checkout@v5
            - uses: actions/setup-node@v5
              with:
                  node-version: '24'
                  cache: npm
            - run: npm ci
            - name: Typecheck
              run: npx tsc --noEmit
            - name: Lint
              run: npm run lint
            - name: Format check
              run: npm run format:check
            - name: Test
              run: npm test
            - name: Build
              run: npm run build

    e2e:
        runs-on: ubuntu-latest
        services:
            redis:
                image: redis:7
                ports:
                    - 6379:6379
        env:
            REDIS_URL: redis://localhost:6379
        steps:
            - uses: actions/checkout@v5
            - uses: actions/setup-node@v5
              with:
                  node-version: '24'
                  cache: npm
            - run: npm ci
            - name: Install Playwright browsers
              run: npx playwright install --with-deps chromium
            - name: Run E2E tests
              run: npx playwright test
              env:
                  REDIS_URL: redis://localhost:6379
